{% extends "admin/base_site.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
  /* ===== SynapseERP Admin — Unified Dark Theme ===== */
  /* CSS custom properties for future dark/light mode toggle */
  :root {
    --se-bg-primary: #0f172a;
    --se-bg-secondary: #1e293b;
    --se-bg-card: #1e293b;
    --se-bg-surface: #334155;
    --se-bg-input: #0f172a;
    --se-text-primary: #e2e8f0;
    --se-text-secondary: #94a3b8;
    --se-text-muted: #64748b;
    --se-accent: #3b82f6;
    --se-accent-hover: #2563eb;
    --se-accent-dark: #1d4ed8;
    --se-border: rgba(255, 255, 255, 0.1);
    --se-border-hover: rgba(255, 255, 255, 0.2);
    --se-success: #22c55e;
    --se-danger: #ef4444;
    --se-warning: #f59e0b;
    --se-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  /* Body */
  body {
    background: var(--se-bg-primary) !important;
    color: var(--se-text-primary) !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
  }

  /* Top header bar */
  #header {
    background: linear-gradient(135deg, var(--se-bg-secondary) 0%, var(--se-bg-primary) 100%) !important;
    color: var(--se-text-primary) !important;
    box-shadow: var(--se-shadow) !important;
    border-bottom: 1px solid var(--se-border) !important;
  }

  #header a:link, #header a:visited { color: #93c5fd !important; }
  #header a:hover { color: #bfdbfe !important; }
  #branding h1, #branding h1 a { color: var(--se-text-primary) !important; font-weight: 700 !important; }

  /* User tools bar */
  #user-tools { color: var(--se-text-secondary) !important; }
  #user-tools a { color: #93c5fd !important; }

  /* Breadcrumbs */
  div.breadcrumbs {
    background: var(--se-bg-secondary) !important;
    color: var(--se-text-secondary) !important;
    border: none !important;
    border-bottom: 1px solid var(--se-border) !important;
  }
  div.breadcrumbs a { color: #93c5fd !important; }

  /* Main content area */
  #content {
    background: var(--se-bg-primary) !important;
    color: var(--se-text-primary) !important;
  }

  #content h1, #content h2, #content h3 {
    color: var(--se-text-primary) !important;
  }

  /* Module blocks (home page) */
  .module {
    background: var(--se-bg-card) !important;
    border: 1px solid var(--se-border) !important;
    border-radius: 8px !important;
    box-shadow: var(--se-shadow) !important;
    overflow: hidden !important;
  }

  .module h2, .module caption, .inline-group h2 {
    background: var(--se-bg-surface) !important;
    color: var(--se-text-primary) !important;
    font-weight: 600 !important;
    border-bottom: 1px solid var(--se-border) !important;
  }

  .module table { color: var(--se-text-primary) !important; }
  .module table th { color: var(--se-text-secondary) !important; }

  /* Model list links */
  .module a:link, .module a:visited { color: #93c5fd !important; }
  .module a:hover { color: #bfdbfe !important; }

  /* Tables */
  #result_list table, table {
    border-collapse: collapse !important;
  }

  #result_list th, .results th {
    background: var(--se-bg-surface) !important;
    color: var(--se-text-primary) !important;
    border-bottom: 1px solid var(--se-border) !important;
  }

  #result_list td, .results td {
    border-bottom: 1px solid var(--se-border) !important;
    color: var(--se-text-primary) !important;
  }

  #result_list tr:hover td {
    background: rgba(255, 255, 255, 0.03) !important;
  }

  /* Links */
  a:link, a:visited { color: #93c5fd !important; }
  a:hover { color: #bfdbfe !important; }

  /* Buttons */
  .submit-row input[type="submit"],
  input[type="submit"], .button, a.button {
    background: linear-gradient(135deg, var(--se-accent), var(--se-accent-hover)) !important;
    border: none !important;
    border-radius: 6px !important;
    padding: 8px 16px !important;
    color: white !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    transition: all 0.2s !important;
  }

  .submit-row input[type="submit"]:hover,
  input[type="submit"]:hover, .button:hover, a.button:hover {
    background: linear-gradient(135deg, var(--se-accent-hover), var(--se-accent-dark)) !important;
    box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3) !important;
  }

  .submit-row input.default {
    background: linear-gradient(135deg, var(--se-accent), var(--se-accent-hover)) !important;
  }

  /* Delete button */
  .deletelink, .deletelink:hover { color: var(--se-danger) !important; }

  /* Form fields */
  input[type="text"], input[type="password"], input[type="email"],
  input[type="number"], input[type="url"], input[type="date"],
  textarea, select {
    background: var(--se-bg-input) !important;
    color: var(--se-text-primary) !important;
    border: 1px solid var(--se-border) !important;
    border-radius: 6px !important;
    padding: 8px 12px !important;
    transition: border-color 0.2s !important;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--se-accent) !important;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2) !important;
    outline: none !important;
  }

  /* Change list filter sidebar */
  #changelist-filter {
    background: var(--se-bg-card) !important;
    border: 1px solid var(--se-border) !important;
    border-radius: 8px !important;
  }

  #changelist-filter h2 {
    color: var(--se-text-primary) !important;
    border-bottom: 1px solid var(--se-border) !important;
  }

  #changelist-filter h3 {
    color: var(--se-text-secondary) !important;
  }

  #changelist-filter li a { color: #93c5fd !important; }
  #changelist-filter li.selected a { color: var(--se-accent) !important; font-weight: 700 !important; }

  /* Messages */
  .messagelist li {
    border-radius: 6px !important;
    margin-bottom: 8px !important;
  }

  .messagelist li.success {
    background: rgba(34, 197, 94, 0.15) !important;
    border-left: 4px solid var(--se-success) !important;
    color: #86efac !important;
  }

  .messagelist li.error {
    background: rgba(239, 68, 68, 0.15) !important;
    border-left: 4px solid var(--se-danger) !important;
    color: #fca5a5 !important;
  }

  .messagelist li.warning {
    background: rgba(245, 158, 11, 0.15) !important;
    border-left: 4px solid var(--se-warning) !important;
    color: #fcd34d !important;
  }

  /* Calendar & date widgets */
  .calendar, .calendarbox {
    background: var(--se-bg-card) !important;
    border: 1px solid var(--se-border) !important;
  }

  /* Pagination */
  .paginator {
    color: var(--se-text-secondary) !important;
  }

  /* Object tools */
  .object-tools a {
    background: var(--se-bg-surface) !important;
    color: var(--se-text-primary) !important;
    border-radius: 6px !important;
    border: 1px solid var(--se-border) !important;
  }

  .object-tools a:hover {
    background: var(--se-accent) !important;
    color: white !important;
  }

  /* Nav sidebar (Django 3.1+) */
  #nav-sidebar {
    background: var(--se-bg-secondary) !important;
    border-right: 1px solid var(--se-border) !important;
  }

  #nav-sidebar .module th {
    background: var(--se-bg-surface) !important;
  }

  /* Help text */
  .help, .helptext {
    color: var(--se-text-muted) !important;
  }

  /* Fieldsets */
  fieldset {
    background: var(--se-bg-card) !important;
    border: 1px solid var(--se-border) !important;
    border-radius: 8px !important;
  }

  fieldset h2 {
    color: var(--se-text-primary) !important;
  }

  /* Footer */
  #footer {
    color: var(--se-text-muted) !important;
    border-top: 1px solid var(--se-border) !important;
  }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">⚡ SynapseERP Admin</a>
</h1>
{% endblock %}
