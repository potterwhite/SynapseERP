# SynapseERP — Nginx configuration for Docker deployment.
#
# Traffic routing:
#   /static/*              → Django collectstatic output (shared Docker volume)
#   /assets/*              → Vue SPA hashed JS/CSS (baked into image)
#   /api/* /admin/* /i18n/ → proxy to Django/Gunicorn (backend:8000)
#   /*                     → Vue SPA (index.html, Vue Router history-mode fallback)

server {
    listen 80;
    server_name _;

    # Allow larger file uploads (attendance Excel files, BOM files)
    client_max_body_size 20M;

    # Suppress noisy 404 logs for favicon
    location = /favicon.ico { access_log off; log_not_found off; }

    # Django admin/app static files collected by `manage.py collectstatic`.
    # Written by the backend container into the shared static_volume.
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vue SPA assets have content-hashed filenames → immutable cache
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Django backend: REST API, Django admin, i18n language switching
    location ~ ^/(api|admin|i18n)/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Vue SPA catch-all.
    # try_files: serve file if it exists, otherwise return index.html.
    # This lets Vue Router handle deep links like /pm/gantt, /attendance, etc.
    location / {
        root  /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
