# SynapseERP — Docker Compose (production-like)
#
# Services:
#   postgres  — PostgreSQL 16 Alpine (persistent data volume)
#   backend   — Django 5 + Gunicorn :8000 (internal, not exposed to host)
#   nginx     — Nginx :80 (public), serves Vue SPA + proxies API to backend
#
# Quick start:
#   cp .env.docker.example .env.docker
#   # Fill in DJANGO_SECRET_KEY and DB_PASSWORD in .env.docker
#   docker compose --env-file .env.docker up -d --build
#   docker compose --env-file .env.docker exec backend python manage.py createsuperuser
#   open http://localhost
#
# Or use the ./synapse orchestrator:
#   cp .env.docker.example .env.docker && <fill secrets>
#   ./synapse docker:up

services:

  postgres:
    image: postgres:16-alpine
    container_name: synapse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-synapse_db}
      POSTGRES_USER:     ${DB_USER:-synapse_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Health check used by backend's depends_on condition
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse_user} -d ${DB_NAME:-synapse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: synapse_backend
    restart: unless-stopped
    # Wait for PostgreSQL to pass health check before starting
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: synapse_project.settings
      DJANGO_SECRET_KEY:      ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG:           ${DJANGO_DEBUG:-False}
      # Include "backend" so Gunicorn health checks inside Docker succeed
      DJANGO_ALLOWED_HOSTS:   ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CSRF_TRUSTED_ORIGINS:   ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      # PostgreSQL connection (container hostname = service name "postgres")
      DB_ENGINE:   django.db.backends.postgresql
      DB_NAME:     ${DB_NAME:-synapse_db}
      DB_USER:     ${DB_USER:-synapse_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST:     postgres
      DB_PORT:     5432
      # Optional: Obsidian vault sync (mount the vault path as a bind-mount below)
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      # Gunicorn worker count (default 3; raise for high traffic)
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    volumes:
      # staticfiles written by collectstatic — shared with nginx container
      - static_volume:/app/backend/staticfiles
      # Optional Obsidian vault bind-mount.
      # Uncomment the line below AND set OBSIDIAN_VAULT_PATH in .env.docker
      # to enable vault sync. The host path must exist before running docker compose up.
      # - ${OBSIDIAN_VAULT_PATH:-/tmp/vault_disabled}:/vault:ro
    # backend is NOT exposed to the host; Nginx proxies to it internally

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: synapse_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      # Read-only mount of Django static files written by the backend container
      - static_volume:/app/staticfiles:ro

volumes:
  postgres_data:    # PostgreSQL data (persists across docker compose down/up)
  static_volume:    # Django collectstatic output (shared: backend writes, nginx reads)
